{% extends "base.html" %}
{% block title %}Edit {{ c.name }} — Molibrary{% endblock %}
{% block content %}

<div class="page-header">
  <h1>Edit: {{ c.name }}</h1>
  <a href="{{ url_for('view_compound', cid=c.id) }}" class="btn btn-ghost">
    <svg class="icon" aria-hidden="true"><use href="#icon-arrow-left"/></svg> Back
  </a>
</div>

{% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}

<form class="compound-form" method="POST" enctype="multipart/form-data">
  <div class="form-row">

    <!-- Left column -->
    <div>
      <div class="form-group">
        <label class="form-label required">Compound Name</label>
        <input type="text" name="name" class="form-control" required
               value="{{ c.name }}">
      </div>

      <div class="form-group">
        <label class="form-label">Author / Chemist</label>
        <input type="text" name="author" class="form-control"
               value="{{ c.author or '' }}"
               placeholder="e.g. Your Name">
      </div>

      {% set init_smiles = c.smiles %}
      {% set init_mol    = c.molblock %}
      {% include "editor_snippet.html" %}
    </div>

    <!-- Right column -->
    <div>
      <div class="form-group">
        <label class="form-label">Notes / Procedure Summary</label>
        <textarea name="notes" class="form-control" rows="7">{{ c.notes or '' }}</textarea>
      </div>

      <div class="form-group" style="margin-top:4px">
        <label class="form-label">
          Synthetic Protocol (PDF)
          {% if c.pdf_filename %}
          — current:
          <a href="{{ url_for('serve_pdf', filename=c.pdf_filename) }}" target="_blank"
             style="font-weight:400;text-transform:none;letter-spacing:0">
            {{ c.pdf_filename }}
          </a>
          {% endif %}
        </label>
        <div class="file-drop-zone" id="drop_zone">
          <input type="file" name="pdf" id="pdf_input" accept=".pdf" class="file-input">
          <label for="pdf_input" class="file-label">
            <span class="file-icon">
              <svg class="icon icon-xl" aria-hidden="true"><use href="#icon-file"/></svg>
            </span>
            <strong>Click to choose or drag a PDF here</strong>
            <span id="file_name_display">
              {% if c.pdf_filename %}Replace existing PDF{% else %}No file selected{% endif %}
            </span>
          </label>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary btn-lg">Save Changes</button>
        <a href="{{ url_for('view_compound', cid=c.id) }}" class="btn btn-ghost">Cancel</a>
      </div>
    </div>

  </div>
</form>

<script>
const inp  = document.getElementById('pdf_input');
const disp = document.getElementById('file_name_display');
inp.addEventListener('change', () => {
  disp.textContent = inp.files[0]?.name || 'No file selected';
});
const dz = document.getElementById('drop_zone');
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', ()  => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('dragover');
  if (e.dataTransfer.files[0]) {
    inp.files = e.dataTransfer.files;
    disp.textContent = inp.files[0].name;
  }
});
</script>
{% endblock %}
