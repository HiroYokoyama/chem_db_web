{% extends "base.html" %}
{% block title %}Add Compound — Molibrary{% endblock %}
{% block content %}

<div class="page-header">
  <h1>Add Compound</h1>
  <a href="{{ url_for('index') }}" class="btn btn-ghost">
    <svg class="icon" aria-hidden="true"><use href="#icon-arrow-left"/></svg> Library
  </a>
</div>

{% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}

<form class="compound-form" method="POST" enctype="multipart/form-data">
  <div class="form-row">

    <!-- Left column: identity + structure -->
    <div>
      <div class="form-group">
        <label class="form-label required">Compound Name</label>
        <input type="text" name="name" class="form-control" required
               placeholder="e.g. Aspirin">
      </div>

      <div class="form-group">
        <label class="form-label">Author / Chemist</label>
        <input type="text" name="author" class="form-control"
               placeholder="e.g. Your Name">
      </div>

      <div class="form-group">
        <label class="form-label">
          <svg class="icon" aria-hidden="true"><use href="#icon-tag"/></svg>
          Tags
        </label>
        <input type="text" name="tags" class="form-control"
               placeholder="#triphenylene #sumanene #PAH"
               autocomplete="off">
        <p style="font-size:11.5px; color:var(--muted); margin-top:5px;">
          Use <code>#</code> prefix or separate with spaces/commas
        </p>
      </div>

      {% include "editor_snippet.html" %}
    </div>

    <!-- Right column: notes + PDFs -->
    <div>
      <div class="form-group">
        <label class="form-label">Notes / Procedure Summary</label>
        <textarea name="notes" class="form-control" rows="7"
                  placeholder="Reaction conditions, yield, observations…"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">
          <svg class="icon" aria-hidden="true"><use href="#icon-file"/></svg>
          PDFs / Spectra
        </label>
        <div id="pdf_rows_container"></div>
        <button type="button" class="btn btn-ghost btn-sm" id="add_pdf_btn" style="margin-top:4px"
                onclick="addPdfRow()">
          <svg class="icon" aria-hidden="true"><use href="#icon-plus"/></svg> Add PDF
        </button>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary btn-lg">Save Compound</button>
        <a href="{{ url_for('index') }}" class="btn btn-ghost">Cancel</a>
      </div>
    </div>

  </div>
</form>

<script>
const PDF_TYPES = {{ pdf_types | tojson }};

function addPdfRow() {
  const container = document.getElementById('pdf_rows_container');
  const row = document.createElement('div');
  row.className = 'pdf-row';
  row.innerHTML = `
    <select name="pdf_type" class="form-control">
      ${PDF_TYPES.map(t => `<option value="${t}">${t}</option>`).join('')}
    </select>
    <input type="file" name="pdf_file" accept=".pdf"
           onchange="this.nextElementSibling.textContent = this.files[0]?.name || ''">
    <span class="file-name-hint"></span>
    <button type="button" class="btn btn-ghost btn-sm" title="Remove"
            onclick="this.closest('.pdf-row').remove()">
      <svg class="icon" aria-hidden="true"><use href="#icon-x"/></svg>
    </button>
  `;
  container.appendChild(row);
  // Set drag-and-drop on the file input
  const fileInput = row.querySelector('input[type=file]');
  row.addEventListener('dragover', e => { e.preventDefault(); row.style.borderColor = 'var(--accent)'; });
  row.addEventListener('dragleave', () => { row.style.borderColor = ''; });
  row.addEventListener('drop', e => {
    e.preventDefault(); row.style.borderColor = '';
    const f = e.dataTransfer.files[0];
    if (f && f.name.toLowerCase().endsWith('.pdf')) {
      const dt = new DataTransfer();
      dt.items.add(f);
      fileInput.files = dt.files;
      row.querySelector('.file-name-hint').textContent = f.name;
    }
  });
}

// Start with one row
addPdfRow();
</script>
{% endblock %}
